{% extends "base.html" %} {% block content %}

<h3>{{ meet.name }}</h3>
<p>Date: {{ meet.date }}</p>

<h4>Events</h4>

{% for event in meet.events %}
<div>
  <p><strong>{{ event.name }}</strong></p>

  {% for i in range(event.rounds) %}
  <a href="{{ url_for('round_detail', event_id=event.id, round_number=i+1) }}">
    Round {{ i + 1 }} </a
  ><br />
  {% endfor %}

  <!-- Add Round -->
  <form method="POST" action="{{ url_for('add_round', event_id=event.id) }}">
    <button type="submit">+ Round</button>
  </form>

  <!-- Remove Round -->
  <form method="POST" action="{{ url_for('remove_round', event_id=event.id) }}">
    <button type="submit">- Round</button>
  </form>

  <!-- Delete Event -->
  <form method="POST" action="{{ url_for('delete_event', event_id=event.id) }}">
    <button type="submit">Delete Event</button>
  </form>
</div>

{% else %}
<p>No events yet</p>
{% endfor %}

<h4>Add New Event</h4>

<form method="POST" action="{{ url_for('add_event', meet_id=meet.id) }}">
  <label>Event:</label>
  <select name="event_name">
    <option value="3x3">3x3</option>
    <option value="2x2">2x2</option>
    <option value="4x4">4x4</option>
    <option value="5x5">5x5</option>
    <option value="6x6">6x6</option>
    <option value="7x7">7x7</option>
    <option value="Pyraminx">Pyraminx</option>
    <option value="Megaminx">Megaminx</option>
    <option value="Skewb">Skewb</option>
  </select>

  <label>Rounds:</label>
  <input type="number" name="rounds" min="1" value="1" />

  <button type="submit">Add Event</button>
</form>

<a href="{{ url_for('home') }}">
  <button>Back to Home</button>
</a>

{% endblock %}
