{% extends "base.html" %} {% block content %}

<h3>All Persons</h3>

<table>
  <tbody>
    {% for person in competitors %}
    <tr>
      <td>
        <a
          href="{{ url_for('person_detail', meet_id=meet.id, competitor_id=person.id) }}"
        >
          {{ person.name }}
        </a>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>

<a href="{{ url_for('meet_detail', meet_id=meet.id) }}">
  <button type="button">Back to Meet</button>
</a>
{% endblock %}
