{% extends "base.html" %} {% block content %}

<h3>All Persons</h3>

<table>
  <tbody>
    {% for person in competitors %}
    <tr>
      <td>
        <a
          href="{{ url_for('global_person_detail', competitor_name=person.name) }}"
        >
          {{ person.name }}
        </a>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>

<a href="{{ url_for('home') }}">
  <button type="button">Back to Home</button>
</a>
{% endblock %}
